<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دعوة زفاف Mustafa & Asmaa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cairo:wght@300;400;500;700&family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Tajawal:wght@300;400;500;700&family=Playfair+Display:wght@400;500;600;700&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="intro">
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-content">
      <div class="loading-title">Mustafa & Asmaa</div>
      <div class="loading-subtitle">دعوتكم لأجمل ليلة</div>
      <div class="spinner"></div>
    </div>
  </div>

  <div class="intro-screen" id="introScreen">
    <div class="intro-glow"></div>
    <div class="intro-card">
      <div class="intro-label">Wedding Invitation</div>
      <button class="envelope" id="envelopeButton" aria-label="فتح الدعوة">
        <div class="envelope-particles">
          <div class="envelope-particle"></div>
          <div class="envelope-particle"></div>
          <div class="envelope-particle"></div>
          <div class="envelope-particle"></div>
        </div>
        <div class="envelope-body">
          <!-- Letter/Card الداخلي -->
          <div class="letter">
            <div class="letter-text">Mustafa & Asmaa</div>
            <div class="letter-date">June 26, 2026</div>
          </div>
          <!-- الشريط الحريري -->
          <div class="envelope-ribbon"></div>
        </div>
        <!-- غطاء الظرف -->
        <div class="envelope-flap"></div>
        <!-- ختم شمعي -->
        <div class="wax-seal" aria-hidden="true">
          <div class="seal-shine"></div>
        </div>
      </button>
      <p class="intro-note">اضغط على الظرف لفتح دعوة الزفاف</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
